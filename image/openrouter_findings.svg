<text x="631.0" y="524" font-family="DejaVu Sans, sans-serif" font-size="15.5" font-weight="normal" fill="#97a3b6" text-anchor="start" opacity="1">carry a high-severity</text>
<text x="631.0" y="543" font-family="DejaVu Sans, sans-serif" font-size="15.5" font-weight="normal" fill="#97a3b6" text-anchor="start" opacity="1">gap</text>
