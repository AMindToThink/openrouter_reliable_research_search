<text x="114" y="60" font-family="DejaVu Sans Mono, monospace" font-size="20" font-weight="bold" fill="#6fa0e6" text-anchor="start" letter-spacing="3" opacity="1">PROVIDER ROUTING INSPECTOR</text>
<text x="1128" y="60" font-family="DejaVu Sans Mono, monospace" font-size="17" font-weight="normal" fill="#6b7789" text-anchor="end" opacity="1">openrouter reliability audit</text>
<text x="72" y="210" font-family="DejaVu Sans Mono, monospace" font-size="150" font-weight="bold" fill="#e37363" text-anchor="start" opacity="1">89%</text>
<text x="372" y="128" font-family="DejaVu Sans, sans-serif" font-size="33" font-weight="bold" fill="#e7edf5" text-anchor="start" opacity="1">of 35 influential AI-research repos that</text>
<text x="372" y="170" font-family="DejaVu Sans, sans-serif" font-size="33" font-weight="bold" fill="#e7edf5" text-anchor="start" opacity="1">route through OpenRouter leave a silent</text>
<text x="372" y="212" font-family="DejaVu Sans, sans-serif" font-size="33" font-weight="bold" fill="#e7edf5" text-anchor="start" opacity="1">provider-routing corruption channel open.</text>
<text x="72" y="300" font-family="DejaVu Sans, sans-serif" font-size="22" font-weight="normal" fill="#97a3b6" text-anchor="start" opacity="1">OpenRouter serves “a model” from whichever provider is cheapest-and-up — at any</text>
<text x="72" y="332" font-family="DejaVu Sans, sans-serif" font-size="22" font-weight="normal" fill="#97a3b6" text-anchor="start" opacity="1">quantization down to int4, silently dropping sampling params it can’t honor. Two</text>
<text x="72" y="364" font-family="DejaVu Sans, sans-serif" font-size="22" font-weight="normal" fill="#97a3b6" text-anchor="start" opacity="1">identical requests can come back as different weights.</text>
