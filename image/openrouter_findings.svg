<text x="94.0" y="498" font-family="DejaVu Sans Mono, monospace" font-size="46" font-weight="bold" fill="#e37363" text-anchor="start" opacity="1">31/32</text>
<text x="94.0" y="524" font-family="DejaVu Sans, sans-serif" font-size="15.5" font-weight="normal" fill="#97a3b6" text-anchor="start" opacity="1">at risk, of the 32</text>
<text x="94.0" y="543" font-family="DejaVu Sans, sans-serif" font-size="15.5" font-weight="normal" fill="#97a3b6" text-anchor="start" opacity="1">whose output reaches a</text>
<text x="94.0" y="562" font-family="DejaVu Sans, sans-serif" font-size="15.5" font-weight="normal" fill="#97a3b6" text-anchor="start" opacity="1">result</text>
