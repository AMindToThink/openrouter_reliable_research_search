<text x="362.5" y="524" font-family="DejaVu Sans, sans-serif" font-size="15.5" font-weight="normal" fill="#97a3b6" text-anchor="start" opacity="1">specific claims /</text>
<text x="362.5" y="543" font-family="DejaVu Sans, sans-serif" font-size="15.5" font-weight="normal" fill="#97a3b6" text-anchor="start" opacity="1">figures possibly</text>
<text x="362.5" y="562" font-family="DejaVu Sans, sans-serif" font-size="15.5" font-weight="normal" fill="#97a3b6" text-anchor="start" opacity="1">affected</text>
