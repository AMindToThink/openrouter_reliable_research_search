<text x="899.5" y="524" font-family="DejaVu Sans, sans-serif" font-size="15.5" font-weight="normal" fill="#97a3b6" text-anchor="start" opacity="1">uses it properly — the</text>
<text x="899.5" y="543" font-family="DejaVu Sans, sans-serif" font-size="15.5" font-weight="normal" fill="#97a3b6" text-anchor="start" opacity="1">only one</text>
<rect x="72" y="598" width="26" height="3" fill="#6fa0e6"/>
<text x="110" y="606" font-family="DejaVu Sans Mono, monospace" font-size="18" font-weight="bold" fill="#97a3b6" text-anchor="start" letter-spacing="1" opacity="1">WHICH MISTAKES SHOW UP  ·  repos exhibiting each (of 35)</text>
<text x="72" y="669" font-family="DejaVu Sans Mono, monospace" font-size="18" font-weight="bold" fill="#6b7789" text-anchor="start" opacity="1">M4</text>
