<text x="92" y="1026" font-family="DejaVu Sans, sans-serif" font-size="16" font-weight="normal" fill="#97a3b6" text-anchor="start" opacity="1">High — can distort a result</text>
<rect x="372" y="1014" width="13" height="13" rx="3" fill="#e0ab4d"/>
<text x="392" y="1026" font-family="DejaVu Sans, sans-serif" font-size="16" font-weight="normal" fill="#97a3b6" text-anchor="start" opacity="1">Medium — reproducibility / leakage / disclosure</text>
<rect x="72" y="1058" width="1056" height="132" rx="12" fill="#161d27" stroke="#28313d"/>
<rect x="72" y="1058" width="4" height="132" rx="2" fill="#6fa0e6"/>
<text x="96" y="1092" font-family="DejaVu Sans Mono, monospace" font-size="15" font-weight="bold" fill="#6fa0e6" text-anchor="start" letter-spacing="1.5" opacity="1">READ THIS CORRECTLY</text>
<text x="96" y="1120" font-family="DejaVu Sans, sans-serif" font-size="18" font-weight="normal" fill="#97a3b6" text-anchor="start" opacity="1">“At risk” means the code leaves a known corruption channel open and uncontrolled — not that any</text>
<text x="96" y="1146" font-family="DejaVu Sans, sans-serif" font-size="18" font-weight="normal" fill="#97a3b6" text-anchor="start" opacity="1">published number is wrong. We audited how each repo routes model calls and adversarially</text>
<text x="96" y="1172" font-family="DejaVu Sans, sans-serif" font-size="18" font-weight="normal" fill="#97a3b6" text-anchor="start" opacity="1">re-checked every verdict against the source. Selection was importance-first, not mistake-first.</text>
<rect x="72" y="1224" width="1056" height="150" rx="12" fill="#161d27" stroke="#28313d"/>
<rect x="72" y="1224" width="4" height="150" rx="2" fill="#46c08a"/>
<text x="96" y="1258" font-family="DejaVu Sans Mono, monospace" font-size="15" font-weight="bold" fill="#46c08a" text-anchor="start" letter-spacing="1.5" opacity="1">THE FIX  ·  ~5 MINUTES</text>
<text x="96" y="1294" font-family="DejaVu Sans Mono, monospace" font-size="17" font-weight="normal" fill="#e7edf5" text-anchor="start" opacity="1">provider = { &quot;quantizations&quot;: [&quot;fp8&quot;,&quot;fp16&quot;,&quot;bf16&quot;],  &quot;require_parameters&quot;: true,</text>
<text x="96" y="1320" font-family="DejaVu Sans Mono, monospace" font-size="17" font-weight="normal" fill="#e7edf5" text-anchor="start" opacity="1">             &quot;data_collection&quot;: &quot;deny&quot;,  &quot;order&quot;: [&quot;&lt;the-provider-you-validated&gt;&quot;] }</text>
<text x="96" y="1350" font-family="DejaVu Sans Mono, monospace" font-size="17" font-weight="normal" fill="#46c08a" text-anchor="start" opacity="1">→ then log which provider actually served each call. Now anyone can reproduce you.</text>
<text x="72" y="1400" font-family="DejaVu Sans Mono, monospace" font-size="15" font-weight="normal" fill="#6b7789" text-anchor="start" letter-spacing="0.5" opacity="1">SOURCES  NeurIPS · ICML · ICLR · ACL · NAACL · Nature · UK AISI · METR · Redwood · Palisade · LessWrong</text>
<text x="72" y="1430" font-family="DejaVu Sans Mono, monospace" font-size="15" font-weight="normal" fill="#97a3b6" text-anchor="start" opacity="1">importance-first · audit + adversarial verify per repo</text>
<text x="1128" y="1430" font-family="DejaVu Sans Mono, monospace" font-size="15" font-weight="normal" fill="#6fa0e6" text-anchor="end" opacity="1">github.com/AMindToThink/openrouter_reliable_research_search</text>
