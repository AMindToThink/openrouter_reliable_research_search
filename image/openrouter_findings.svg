<text x="124" y="853" font-family="DejaVu Sans, sans-serif" font-size="19" font-weight="normal" fill="#e7edf5" text-anchor="start" opacity="1">Silent param dropping</text>
<rect x="392" y="836" width="676" height="22" rx="5" fill="#161d27"/>
<rect x="392" y="836" width="531.1" height="22" rx="5" fill="#e37363"/>
<text x="1084" y="854" font-family="DejaVu Sans Mono, monospace" font-size="21" font-weight="bold" fill="#e7edf5" text-anchor="start" opacity="1">22</text>
