<text x="124" y="807" font-family="DejaVu Sans, sans-serif" font-size="19" font-weight="normal" fill="#e7edf5" text-anchor="start" opacity="1">Probabilistic routing</text>
<rect x="392" y="790" width="676" height="22" rx="5" fill="#161d27"/>
<rect x="392" y="790" width="627.7" height="22" rx="5" fill="#e37363"/>
