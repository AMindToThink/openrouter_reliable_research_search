<text x="124" y="899" font-family="DejaVu Sans, sans-serif" font-size="19" font-weight="normal" fill="#e7edf5" text-anchor="start" opacity="1">Model version drift</text>
<rect x="392" y="882" width="676" height="22" rx="5" fill="#161d27"/>
<rect x="392" y="882" width="531.1" height="22" rx="5" fill="#e0ab4d"/>
