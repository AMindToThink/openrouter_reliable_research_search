<text x="124" y="761" font-family="DejaVu Sans, sans-serif" font-size="19" font-weight="normal" fill="#e7edf5" text-anchor="start" opacity="1">Unpinned quantization</text>
<rect x="392" y="744" width="676" height="22" rx="5" fill="#161d27"/>
<rect x="392" y="744" width="627.7" height="22" rx="5" fill="#e37363"/>
